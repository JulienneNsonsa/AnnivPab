<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>
    <link rel="stylesheet" href="../css/enveloppe.css">
    <script src="../js/enveloppe.js"defer></script>
</head>
<body>
    <div class="envelope-wrapper" id="envelopeWrapper">
    <div class="envelope" id="envelope" onclick="openEnvelope()">
        <div class="envelope-back"></div>
        <div class="letter">
            <p>Vous êtes invité(e)</p>
        </div>
        <div class="envelope-front-left"></div>
        <div class="envelope-front-right"></div>
        <div class="envelope-flap"></div>
        <div class="seal">PAB</div>
    </div>
    <p class="click-hint">Cliquez sur l'enveloppe</p>
</div>
</body>
</html>
